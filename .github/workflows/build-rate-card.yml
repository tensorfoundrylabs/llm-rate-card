name: build rate card

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    name: test and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: install dependencies
        run: uv sync

      - name: fmt check
        run: uv run ruff format --check src/ tests/

      - name: lint
        run: uv run ruff check src/ tests/

      - name: type check
        run: uv run mypy src/rate_card/

      - name: test with coverage
        run: uv run pytest tests/ --cov=rate_card --cov-report=term-missing --cov-fail-under=90

  generate-fixture:
    name: generate (fixture)
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: install dependencies
        run: uv sync

      - name: generate from fixture
        run: |
          mkdir -p dist
          uv run rate-card generate \
            --use-fixture \
            --output dist/rate-card.json

      - name: validate output
        run: uv run rate-card validate dist/rate-card.json

      - name: upload fixture artefact
        uses: actions/upload-artifact@v4
        with:
          name: rate-card-fixture
          path: dist/rate-card.json
          retention-days: 7

  release:
    name: generate and release
    needs: ci
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: install dependencies
        run: uv sync

      - name: get previous rate card
        id: prev
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download latest -p rate-card.json -O previous.json
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: generate from live sources
        run: |
          mkdir -p dist
          PREV_FLAG=""
          if [ -f previous.json ]; then
            PREV_FLAG="--previous previous.json"
          fi
          uv run rate-card generate \
            --output dist/rate-card.json \
            $PREV_FLAG

      - name: validate output
        run: uv run rate-card validate dist/rate-card.json

      - name: compress artefact
        run: gzip -k -9 dist/rate-card.json

      - name: check if content changed
        id: changed
        run: |
          NEW_HASH=$(python3 -c "import json; d=json.load(open('dist/rate-card.json')); print(d['content_hash'])")
          echo "new_hash=$NEW_HASH" >> "$GITHUB_OUTPUT"
          if [ -f previous.json ]; then
            OLD_HASH=$(python3 -c "import json; d=json.load(open('previous.json')); print(d['content_hash'])")
            echo "old_hash=$OLD_HASH" >> "$GITHUB_OUTPUT"
            if [ "$NEW_HASH" = "$OLD_HASH" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "Content unchanged, skipping release."
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: create release tag
        id: tag
        if: steps.changed.outputs.changed == 'true'
        run: |
          DATE=$(date -u +%Y.%m.%d)
          TAG="$DATE"
          N=1
          while git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; do
            TAG="$DATE-$N"
            N=$((N + 1))
          done
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: sign artefact with sigstore
        if: steps.changed.outputs.changed == 'true' && vars.RELEASE_SIGNING == 'true'
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: dist/rate-card.json

      - name: get previous tag
        id: prev_tag
        if: steps.changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"

      - name: publish release
        if: steps.changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PREV_TAG="${{ steps.prev_tag.outputs.tag }}"
          NEW_TAG="$TAG"

          HASH_JSON=$(sha256sum dist/rate-card.json | awk '{print $1}')
          HASH_GZ=$(sha256sum dist/rate-card.json.gz | awk '{print $1}')
          CONTENT_HASH=$(python3 -c "import json; print(json.load(open('dist/rate-card.json'))['content_hash'])")

          if [ -n "$PREV_TAG" ]; then
            COMPARE_LINE="Compare: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${NEW_TAG}"
          else
            COMPARE_LINE="Compare: first release"
          fi

          ASSETS="dist/rate-card.json dist/rate-card.json.gz"

          TABLE_ROWS="| \`rate-card.json\` | \`sha256:${HASH_JSON}\` |
| \`rate-card.json.gz\` | \`sha256:${HASH_GZ}\` |"

          if [ -f dist/rate-card.divergences.json ]; then
            HASH_DIV=$(sha256sum dist/rate-card.divergences.json | awk '{print $1}')
            ASSETS="$ASSETS dist/rate-card.divergences.json"
            TABLE_ROWS="${TABLE_ROWS}
| \`rate-card.divergences.json\` | \`sha256:${HASH_DIV}\` |"
          fi

          if [ "${{ vars.RELEASE_SIGNING }}" = "true" ]; then
            if [ -f "dist/rate-card.json.sigstore.json" ]; then
              HASH_SIG=$(sha256sum dist/rate-card.json.sigstore.json | awk '{print $1}')
              ASSETS="$ASSETS dist/rate-card.json.sigstore.json"
              TABLE_ROWS="${TABLE_ROWS}
| \`rate-card.json.sigstore.json\` | \`sha256:${HASH_SIG}\` |"
            fi
          fi

          if [ -f previous.json ]; then
            SUMMARY=$(uv run rate-card summarise --previous previous.json dist/rate-card.json 2>/dev/null || echo "No changes.")
          else
            SUMMARY=$(uv run rate-card summarise dist/rate-card.json 2>/dev/null || echo "No changes.")
          fi

          cat > release-notes.md <<NOTES_EOF
${COMPARE_LINE}

${SUMMARY}

| Artefact | SHA-256 |
|---|---|
${TABLE_ROWS}

Content hash: \`sha256:${CONTENT_HASH}\`
NOTES_EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            $ASSETS
