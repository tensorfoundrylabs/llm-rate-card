# Curated model whitelist for the TensorFoundry LLM Rate Card.
# Format: provider -> list of model_id values (matching the key after provider:).
# These correspond to the transformed keys produced by the LiteLLM source.
# ~103 models across the providers Alloy supports.

# ── Anthropic direct ──────────────────────────────────────────────────────────
anthropic:
  # Sonnet 4.x line
  - claude-sonnet-4-5
  - claude-sonnet-4-5-20250929
  - claude-sonnet-4-6
  - claude-sonnet-4-20250514
  # Opus 4.x line
  - claude-opus-4-5
  - claude-opus-4-6
  - claude-opus-4-7
  - claude-opus-4-20250514
  # Haiku (cost-effective)
  - claude-haiku-4-5
  - claude-3-haiku-20240307
  # 3.x still in production
  - claude-3-7-sonnet-20250219
  - claude-3-opus-20240229

# ── Anthropic via Bedrock ─────────────────────────────────────────────────────
bedrock:
  # Sonnet 4.x
  - anthropic.claude-sonnet-4-5-20250929-v1:0
  - anthropic.claude-sonnet-4-6
  # Opus 4.x
  - anthropic.claude-opus-4-5-20251101-v1:0
  - anthropic.claude-opus-4-6-v1
  - anthropic.claude-opus-4-7
  # Haiku + legacy
  - anthropic.claude-haiku-4-5-20251001-v1:0
  - anthropic.claude-3-7-sonnet-20250219-v1:0
  # Amazon Nova
  - amazon.nova-pro-v1:0
  - amazon.nova-lite-v1:0
  - amazon.nova-micro-v1:0
  # Meta Llama 4 via Bedrock
  - meta.llama4-maverick-17b-instruct-v1:0

# ── Anthropic via Vertex AI ───────────────────────────────────────────────────
# Vertex pins models with @<date> or @default. LiteLLM lists the @-variants
# directly; entries without @ are kept for forward-looking parity.
vertex:
  # Sonnet 4.x line
  - claude-sonnet-4-5@20250929
  - claude-sonnet-4-6@default
  - claude-sonnet-4@20250514
  # Opus 4.x line
  - claude-opus-4-5@20251101
  - claude-opus-4-6@default
  - claude-opus-4-7@default
  - claude-opus-4@20250514
  # Haiku
  - claude-haiku-4-5@20251001
  # 3.x still in production
  - claude-3-7-sonnet@20250219
  - claude-3-5-sonnet
  # Vertex Gemini 2.x
  - gemini-2.0-flash
  - gemini-2.5-flash
  - gemini-2.5-pro
  # Vertex Gemini 3.x
  - gemini-3.1-pro-preview
  - gemini-3-flash-preview
  - gemini-3-pro-preview
  - gemini-3.1-flash-lite-preview

# ── OpenAI ────────────────────────────────────────────────────────────────────
openai:
  # GPT-4o family
  - gpt-4o
  - gpt-4o-mini
  # GPT-4.1 family (long-context)
  - gpt-4.1
  - gpt-4.1-mini
  - gpt-4.1-nano
  # GPT-5 family
  - gpt-5
  - gpt-5-mini
  - gpt-5.4
  # o-series reasoning
  - o1
  - o3
  - o3-mini
  - o4-mini
  # Embeddings
  - text-embedding-3-large
  - text-embedding-3-small

# ── Gemini direct ─────────────────────────────────────────────────────────────
gemini:
  # 2.x line
  - gemini-2.0-flash
  - gemini-2.0-flash-lite
  - gemini-2.5-flash
  - gemini-2.5-flash-lite
  - gemini-2.5-pro
  # 3.x line
  - gemini-3.1-flash-lite-preview
  - gemini-3-flash-preview
  - gemini-3-pro-preview
  - gemini-3.1-pro-preview

# ── DeepSeek ─────────────────────────────────────────────────────────────────
deepseek:
  - deepseek-chat
  - deepseek-reasoner
  - deepseek-r1
  - deepseek-v3
  - deepseek-v3.2

# ── Mistral ───────────────────────────────────────────────────────────────────
mistral:
  - mistral-small-3-2-2506
  - mistral-large-latest
  - mistral-large-3
  - mistral-medium-latest
  - magistral-medium-latest
  - magistral-small-latest

# ── Cohere ────────────────────────────────────────────────────────────────────
cohere:
  - command-a-03-2025
  - command-r-plus

# ── Groq (hosted open-source inference) ──────────────────────────────────────
# Groq model_ids retain the groq/ namespace prefix (not stripped by the pipeline).
groq:
  - groq/llama-3.3-70b-versatile
  - groq/meta-llama/llama-4-maverick-17b-128e-instruct
  - groq/meta-llama/llama-4-scout-17b-16e-instruct

# ── Perplexity ────────────────────────────────────────────────────────────────
# Perplexity model_ids retain the perplexity/ namespace prefix (not stripped).
perplexity:
  - perplexity/sonar
  - perplexity/sonar-pro
  - perplexity/sonar-reasoning

