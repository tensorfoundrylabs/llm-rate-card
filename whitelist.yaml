# Curated model whitelist for the TensorFoundry LLM Rate Card.
# Format: provider -> list of model_id values (matching the key after provider:).
# These correspond to the transformed keys produced by the LiteLLM source.
# ~80 models across the providers Alloy supports.

# ── Anthropic direct ──────────────────────────────────────────────────────────
anthropic:
  # Sonnet 4.x line
  - claude-sonnet-4-5
  - claude-sonnet-4-5-20250929
  - claude-sonnet-4-6
  # Opus 4.x line
  - claude-opus-4-5
  - claude-opus-4-6
  - claude-opus-4-7
  # Haiku (cost-effective)
  - claude-haiku-4-5
  - claude-3-haiku-20240307
  # 3.x still in production
  - claude-3-7-sonnet-20250219
  - claude-3-opus-20240229

# ── Anthropic via Bedrock ─────────────────────────────────────────────────────
bedrock:
  - anthropic.claude-sonnet-4-5-20250929-v1:0
  - anthropic.claude-haiku-4-5-20251001-v1:0
  - anthropic.claude-3-5-sonnet-20241022-v2:0
  - anthropic.claude-3-5-haiku-20241022-v1:0
  - anthropic.claude-3-haiku-20240307-v1:0
  - anthropic.claude-3-7-sonnet-20250219-v1:0
  - anthropic.claude-opus-4-5-20251101-v1:0

# ── Anthropic via Vertex AI ───────────────────────────────────────────────────
# Vertex pins models with @<date> or @default. LiteLLM lists the @-variants
# directly; entries without @ are kept for forward-looking parity.
vertex:
  # Sonnet 4.x line
  - claude-sonnet-4-5
  - claude-sonnet-4-5@20250929
  - claude-sonnet-4-6
  - claude-sonnet-4-6@default
  - claude-sonnet-4@20250514
  # Opus 4.x line
  - claude-opus-4-5
  - claude-opus-4-5@20251101
  - claude-opus-4-6@default
  - claude-opus-4-7@default
  - claude-opus-4-1@20250805
  - claude-opus-4@20250514
  # Haiku
  - claude-haiku-4-5
  - claude-haiku-4-5@20251001
  # 3.x still in production
  - claude-3-7-sonnet@20250219
  - claude-3-5-sonnet
  - claude-3-5-sonnet@20240620
  - claude-3-5-haiku
  - claude-3-5-haiku@20241022
  - claude-3-haiku@20240307
  - claude-3-opus@20240229
  # Vertex Gemini
  - gemini-2.0-flash
  - gemini-2.5-flash
  - gemini-2.5-pro

# ── OpenAI ────────────────────────────────────────────────────────────────────
openai:
  # GPT-4o family
  - gpt-4o
  - gpt-4o-mini
  # GPT-5 family
  - gpt-5
  - gpt-5-mini
  # GPT-4 turbo (legacy, still used)
  - gpt-4-turbo
  # o-series reasoning
  - o1
  - o3
  - o4-mini
  # Embeddings
  - text-embedding-3-large
  - text-embedding-3-small

# ── Gemini direct ─────────────────────────────────────────────────────────────
gemini:
  - gemini-2.0-flash
  - gemini-2.0-flash-lite
  - gemini-2.5-flash
  - gemini-2.5-flash-lite
  - gemini-2.5-pro

# ── DeepSeek ─────────────────────────────────────────────────────────────────
deepseek:
  - deepseek-chat
  - deepseek-reasoner
  - deepseek-r1
  - deepseek-v3
  - deepseek-v3.2

# ── Mistral ───────────────────────────────────────────────────────────────────
mistral:
  - mistral-small
  - mistral-small-3-2-2506
  - mistral-large-latest
  - mistral-medium-latest
  - open-mistral-nemo

# ── OpenRouter aliases ────────────────────────────────────────────────────────
openrouter:
  # Anthropic via OpenRouter
  - anthropic/claude-sonnet-4.5
  - anthropic/claude-sonnet-4.6
  - anthropic/claude-opus-4.5
  - anthropic/claude-haiku-4.5
  - anthropic/claude-3.5-sonnet
  # OpenAI via OpenRouter
  - openai/gpt-4o
  - openai/gpt-4.1
  - openai/gpt-4.1-mini
  # Google via OpenRouter
  - google/gemini-2.5-flash
  - google/gemini-2.5-pro
  # DeepSeek via OpenRouter
  - deepseek/deepseek-r1
  - deepseek/deepseek-chat
  # Mistral via OpenRouter
  - mistralai/mistral-small-3.2-24b-instruct
  - mistralai/mistral-large
  # Meta via OpenRouter
  - meta-llama/llama-3-70b-instruct
